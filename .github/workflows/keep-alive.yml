name: Keep Backend Alive

on:
  schedule:
    # Ping every 10 minutes during business hours (Mon-Fri, 5 AM - 8 PM UTC)
    - cron: '*/10 5-20 * * 1-5'
    # Ping every 30 minutes outside business hours
    - cron: '*/30 0-4,21-23 * * 1-5'
    # Ping every 30 minutes on weekends
    - cron: '*/30 * * * 0,6'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping health endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.BACKEND_HEALTH_URL }}")
          
          echo "Health check returned: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::warning::Health check failed with status $HTTP_STATUS"
            exit 1
          fi
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
